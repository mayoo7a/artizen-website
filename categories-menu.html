<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Artizen — Categories</title>
<style>
/* ---------- Brand foundations ---------- */
@font-face{font-family:'Alta';src:url('assets/fonts/Alta-Regular.woff2') format('woff2');font-weight:400;font-display:swap}
@font-face{font-family:'Alta';src:url('assets/fonts/Alta-Light.woff2') format('woff2');font-weight:300;font-display:swap}
@font-face{font-family:'Feeling Passionate';src:url('assets/fonts/FeelingPassionate.woff2') format('woff2');font-weight:400;font-display:swap}

:root{
  --olive-green:#7A7E5D;
  --sage-green:#AFB68C;
  --rust-orange:#A45024;
  --terracotta:#C98146;
  --dark-brown:#65402D;
  --mauve-brown:#805B52;
  --warm-beige:#E0D3C0;
  --cream:#FDF0DD;
  --ink:#3E3326;
  --bar:#26201A;            /* warm near-black for the bars */
  --script:'Feeling Passionate', cursive;
  --sans:'Alta', system-ui, sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:var(--sans);
  background:var(--terracotta);
  color:var(--ink);
  min-height:100vh;
  display:flex;align-items:flex-start;justify-content:center;
  padding:2.2rem 1rem 2.6rem;
  letter-spacing:.02em;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
.ic{width:1em;height:1em;display:inline-block;fill:none;stroke:currentColor}

/* ---------- close ---------- */
.close{
  position:fixed;top:1.1rem;right:1.2rem;z-index:10;
  width:40px;height:40px;border:0;background:transparent;color:var(--ink);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.close .ic{width:26px;height:26px}

/* ---------- shell ---------- */
.menu{width:min(520px,100%)}

/* ---------- wordmark ---------- */
.brand{
  text-align:center;
  font-family:var(--script);
  color:var(--dark-brown);
  font-size:clamp(2.4rem,9vw,3.4rem);
  line-height:1;
  margin:.4rem 0 1.6rem;
}

/* ---------- stacked category bars ---------- */
.bars{display:flex;flex-direction:column;gap:.7rem}
.bar{
  position:relative;
  background:var(--bar);
  padding:1.05rem 1.2rem 1.15rem;
  overflow:visible;
  display:flex;align-items:center;justify-content:center;
  border-radius:3px;
}
.bar.cream{background:var(--cream)}
/* thin rule line near the top, like the reference */
.bar::before{
  content:'';position:absolute;left:1.1rem;right:1.1rem;top:.5rem;height:2px;
  background:currentColor;opacity:.32;
}
.word{
  font-family:var(--sans);font-weight:800;
  text-transform:uppercase;
  color:var(--terracotta);                 /* orange */
  font-size:clamp(2.7rem,13.5vw,4.8rem);
  line-height:.92;letter-spacing:-.01em;
}
.word.green{color:var(--olive-green)}      /* green-brown */
.bar{color:var(--terracotta)}      /* drives the rule line colour */

/* ---------- sticker cutouts: white outline vectors, no circle ---------- */
.sticker{
  position:absolute;z-index:4;
  width:clamp(62px,17vw,90px);height:clamp(62px,17vw,90px);
  color:#fff;                              /* white outlines */
  display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 3px 7px rgba(38,32,26,.4));
}
.sticker .ic{width:100%;height:100%}
.s-left {left:-22px}
.s-right{right:-22px}
.r-neg6 {transform:rotate(-8deg)}
.r-pos6 {transform:rotate(9deg)}

/* ---------- social ---------- */
.social{
  display:flex;align-items:center;justify-content:center;gap:1.9rem;
  margin:2.1rem 0 1.1rem;color:var(--dark-brown);
}
.social a .ic{width:24px;height:24px}

/* ---------- footer nav ---------- */
.footnav{
  display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:1.6rem;
  color:var(--dark-brown);
}
.footnav a{
  font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;
}

/* ---------- corner decoration ---------- */
.corner{
  position:fixed;right:.9rem;bottom:.9rem;
  width:clamp(54px,14vw,68px);height:clamp(54px,14vw,68px);
}

@media (max-width:420px){
  .s-left{left:-18px}
  .s-right{right:-18px}
  .sticker{box-shadow:0 6px 14px rgba(38,32,26,.26)}
  .social{gap:1.5rem}
  .footnav{gap:1.1rem}
}
</style>
</head>
