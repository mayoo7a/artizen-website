<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>our studio · sessions, menu and reservations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mirza:wght@400;500;600;700&family=Amiri:ital,wght@0,400;0,700;1,400&family=Gulzar&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/feeling-passionate" rel="stylesheet">
<style>
/* ============================================================
   ARTIZEN - COLOR TOKENS
   Earthy, warm studio palette. Source: brand color-palette.svg
   ============================================================ */

:root {
  /* ---- Brand base palette (raw swatches) ---- */
  --olive-green:  #7A7E5D;   /* deep herbal olive */
  --sage-green:   #AFB68C;   /* soft muted sage   */
  --rust-orange:  #A45024;   /* burnt rust / kiln */
  --terracotta:   #C98146;   /* warm clay         */
  --dark-brown:   #65402D;   /* roasted earth     */
  --mauve-brown:  #805B52;   /* dusty rose-brown  */
  --warm-beige:   #E0D3C0;   /* warm sand         */
  --cream:        #FDF0DD;   /* paper cream       */

  /* ---- Extended tints / shades (derived in oklch from the brand hues) ---- */
  --terracotta-700: oklch(0.50 0.105 50);   /* darker clay for hover */
  --terracotta-300: oklch(0.82 0.065 62);   /* light clay wash */
  --rust-800:       oklch(0.40 0.105 45);   /* deepest kiln */
  --olive-700:      oklch(0.46 0.045 115);  /* darker olive hover */
  --sage-200:       oklch(0.92 0.030 120);  /* palest sage wash */
  --cream-50:       #FFFAF1;                 /* lifted paper */

  /* Ink - warm near-black, never pure #000 */
  --ink-900: #2B1D14;   /* primary text on light */
  --ink-700: #4A372A;   /* secondary text */
  --ink-500: #6F5949;   /* muted / captions */
  --ink-300: #A08C7C;   /* disabled / hairline labels */

  /* ---- Semantic surfaces ---- */
  --surface-page:    var(--cream);        /* default page background */
  --surface-raised:  var(--cream-50);     /* lifted cards on cream */
  --surface-card:    #FFFFFF;             /* clean white cards */
  --surface-sunken:  var(--warm-beige);   /* wells, insets */
  --surface-inverse: var(--dark-brown);   /* dark sections */
  --surface-accent:  var(--terracotta);   /* feature blocks */
  --surface-olive:   var(--olive-green);  /* alt feature blocks */

  /* ---- Semantic text ---- */
  --text-strong:   var(--ink-900);
  --text-body:     var(--ink-700);
  --text-muted:    var(--ink-500);
  --text-disabled: var(--ink-300);
  --text-on-dark:  var(--cream);
  --text-on-accent:#FFFFFF;

  /* ---- Brand / interactive ---- */
  --brand:          var(--terracotta);
  --brand-hover:    var(--terracotta-700);
  --brand-pressed:  var(--rust-orange);
  --brand-subtle:   var(--terracotta-300);
  --accent-olive:   var(--olive-green);
  --accent-olive-hover: var(--olive-700);

  /* ---- Lines and borders ---- */
  --border-soft:   color-mix(in oklch, var(--dark-brown) 14%, transparent);
  --border-medium: color-mix(in oklch, var(--dark-brown) 24%, transparent);
  --border-strong: var(--dark-brown);
  --border-on-dark: color-mix(in oklch, var(--cream) 24%, transparent);

  /* ---- Feedback (kept earthy, never neon) ---- */
  --success: #5E7A4F;   /* leaf */
  --warning: var(--terracotta);
  --danger:  #9E3B2E;   /* fired-clay red */
  --info:    var(--olive-green);

  /* ---- Focus ---- */
  --focus-ring: color-mix(in oklch, var(--rust-orange) 60%, transparent);
}

/* ============================================================
   ARTIZEN - TYPOGRAPHY TOKENS
   Display: Instrument Serif · UI/Body: Hanken Grotesque
   ============================================================ */

:root {
  /* ---- Families (official brand fonts) ---- */
  --font-display: 'Alta', system-ui, sans-serif;                      /* brand display - upload Alta .otf/.ttf/.woff2 to activate */
  --font-sans:    'Mirza', Georgia, serif;                          /* text, prices, UI */
  --font-script:  'Feeling Passionate', 'Mirza', cursive;           /* accent words */
  --font-arabic:  'Amiri', 'Mirza', serif;                          /* Arabic body */
  --font-arabic-display: 'Gulzar', 'Amiri', serif;                  /* Arabic decorative */

  /* ---- Type scale (fluid-ish, rem) ---- */
  --text-2xs: 0.6875rem;  /* 11 - micro labels */
  --text-xs:  0.75rem;    /* 12 */
  --text-sm:  0.875rem;   /* 14 */
  --text-md:  1rem;       /* 16 - base */
  --text-lg:  1.125rem;   /* 18 */
  --text-xl:  1.375rem;   /* 22 */
  --text-2xl: 1.75rem;    /* 28 */
  --text-3xl: 2.25rem;    /* 36 */
  --text-4xl: 3rem;       /* 48 */
  --text-5xl: 4rem;       /* 64 */
  --text-6xl: 5.5rem;     /* 88 - hero display */

  /* ---- Weights (Hanken) ---- */
  --weight-light:    300;
  --weight-regular:  400;
  --weight-medium:   500;
  --weight-semibold: 600;
  --weight-bold:     700;

  /* ---- Line heights ---- */
  --leading-tight:   1.04;  /* display headlines */
  --leading-snug:    1.18;
  --leading-normal:  1.5;
  --leading-relaxed: 1.65;  /* long body copy */

  /* ---- Letter spacing ---- */
  --tracking-tight:  -0.02em;  /* large display */
  --tracking-normal: 0;
  --tracking-wide:   0.04em;
  --tracking-label:  0.16em;   /* uppercase eyebrows / labels */
}

/* ---- Semantic text roles (use as utility classes inside specimens/components) ---- */
.t-display {
  font-family: var(--font-display);
  font-weight: var(--weight-regular);
  font-size: var(--text-6xl);
  line-height: var(--leading-tight);
  letter-spacing: var(--tracking-tight);
  color: var(--text-strong);
}
.t-h1 { font-family: var(--font-display); font-weight: 400; font-size: var(--text-4xl); line-height: var(--leading-tight); letter-spacing: var(--tracking-tight); color: var(--text-strong); }
.t-h2 { font-family: var(--font-display); font-weight: 400; font-size: var(--text-3xl); line-height: var(--leading-snug); color: var(--text-strong); }
.t-h3 { font-family: var(--font-sans); font-weight: var(--weight-semibold); font-size: var(--text-xl); line-height: var(--leading-snug); color: var(--text-strong); }
.t-body { font-family: var(--font-sans); font-weight: var(--weight-regular); font-size: var(--text-md); line-height: var(--leading-relaxed); color: var(--text-body); }
.t-small { font-family: var(--font-sans); font-weight: var(--weight-regular); font-size: var(--text-sm); line-height: var(--leading-normal); color: var(--text-muted); }
.t-eyebrow {
  font-family: var(--font-sans);
  font-weight: var(--weight-semibold);
  font-size: var(--text-xs);
  text-transform: uppercase;
  letter-spacing: var(--tracking-label);
  color: var(--brand);
}
.t-price {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: var(--text-2xl);
  color: var(--rust-orange);
}

/* ============================================================
   ARTIZEN - SPACING, RADIUS, SHADOW, MOTION
   The brand motif is the ARCH - radii skew large and rounded,
   and the signature shape is a "half-arch" top.
   ============================================================ */

:root {
  /* ---- Spacing scale (4px base) ---- */
  --space-0:  0;
  --space-1:  0.25rem;   /* 4  */
  --space-2:  0.5rem;    /* 8  */
  --space-3:  0.75rem;   /* 12 */
  --space-4:  1rem;      /* 16 */
  --space-5:  1.5rem;    /* 24 */
  --space-6:  2rem;      /* 32 */
  --space-7:  3rem;      /* 48 */
  --space-8:  4rem;      /* 64 */
  --space-9:  6rem;      /* 96 */
  --space-10: 8rem;      /* 128 */

  /* ---- Radii ---- */
  --radius-xs:   4px;
  --radius-sm:   8px;
  --radius-md:   14px;
  --radius-lg:   22px;
  --radius-xl:   32px;
  --radius-pill: 999px;
  /* Signature ARCH radius - full half-round top, square base */
  --radius-arch: 999px 999px 0 0;
  --radius-arch-soft: 140px 140px var(--radius-lg) var(--radius-lg);

  /* ---- Shadows - warm-tinted, soft (studio light, never cold gray) ---- */
  --shadow-xs: 0 1px 2px rgba(101, 64, 45, 0.08);
  --shadow-sm: 0 2px 6px rgba(101, 64, 45, 0.10);
  --shadow-md: 0 6px 18px rgba(101, 64, 45, 0.12);
  --shadow-lg: 0 16px 40px rgba(101, 64, 45, 0.16);
  --shadow-inset: inset 0 1px 0 rgba(255, 255, 255, 0.5);

  /* ---- Borders ---- */
  --border-width: 1.5px;
  --border-width-thick: 2.5px;

  /* ---- Motion ---- */
  --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);    /* @kind other */
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);    /* @kind other */
  /* gentle overshoot for playful press */
  --ease-soft:   cubic-bezier(0.34, 1.4, 0.64, 1);  /* @kind other */
  --dur-fast: 120ms;   /* @kind other */
  --dur-base: 220ms;   /* @kind other */
  --dur-slow: 420ms;   /* @kind other */

  /* ---- Layout ---- */
  --container-max: 1200px;
  --container-prose: 68ch;
}

/* ====================================================
   ARTIZEN v4 - mobile-first responsive stylesheet
   Base = phone (≤ 699px). Enhancements at 700px+.
   ==================================================== */

body { margin: 0; overflow-x: hidden; background: var(--cream); }
* { box-sizing: border-box; }

/* ===================================================
   NAV - mobile: slim bar with logo + book + hamburger
   desktop: floating pill with all links
   =================================================== */

/* mobile top bar */
.v4-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 60;
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  background: color-mix(in oklch, var(--cream) 94%, transparent);
  backdrop-filter: blur(10px);
  border-bottom: 1.5px solid var(--border-soft);
}
.v4-nav-logo { display: flex; align-items: center; gap: 8px; }
.v4-nav-logo img { height: 28px; }
.v4-nav-logo span { font-family: var(--font-display); font-weight: 300; font-size: 19px; color: var(--ink-900); }

/* desktop nav links - hidden on mobile */
.v4-nav-links { display: none; }

/* hamburger button - visible on mobile */
.v4-ham {
  width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid var(--border-medium);
  background: var(--cream); cursor: pointer; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 5px; padding: 0; flex: none;
}
.v4-ham span { width: 18px; height: 2px; background: var(--ink-700); border-radius: 2px; display: block; transition: all var(--dur-base) var(--ease-out); }
.v4-ham.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.v4-ham.open span:nth-child(2) { opacity: 0; }
.v4-ham.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* mobile drawer */
.v4-drawer {
  position: fixed; inset: 0; top: 61px; z-index: 55; background: var(--cream);
  display: flex; flex-direction: column; align-items: stretch; padding: 24px 20px;
  gap: 8px; transform: translateX(100%); transition: transform var(--dur-slow) var(--ease-out);
}
.v4-drawer.open { transform: translateX(0); }
.v4-drawer a {
  font-family: var(--font-sans); font-size: 22px; font-weight: 600; color: var(--ink-900);
  padding: 16px 18px; border-radius: var(--radius-md); cursor: pointer;
  border-bottom: 1.5px solid var(--border-soft);
  transition: background var(--dur-fast);
}
.v4-drawer a:hover { background: var(--terracotta-300); }
.v4-drawer .book-cta {
  margin-top: 16px; background: var(--terracotta); color: #fff;
  text-align: center; border-radius: var(--radius-pill); border: none;
  font-family: var(--font-sans); font-size: 18px; font-weight: 700; padding: 18px;
  cursor: pointer;
}

/* desktop: hide the bar, show the pill */
@media (min-width: 700px) {
  .v4-nav {
    top: 14px; left: 50%; right: auto; transform: translateX(-50%);
    border-radius: 999px; border-bottom: none; padding: 6px 8px 6px 16px;
    width: auto; border: 1.5px solid var(--border-medium); box-shadow: var(--shadow-md);
    white-space: nowrap;
  }
  .v4-nav-links { display: flex; align-items: center; gap: 2px; }
  .v4-nav-links a {
    font-family: var(--font-sans); font-size: 14px; font-weight: 600; color: var(--text-body);
    padding: 7px 12px; border-radius: 999px; cursor: pointer; white-space: nowrap;
    transition: background var(--dur-base) var(--ease-out);
  }
  .v4-nav-links a:hover { background: var(--terracotta-300); }
  .v4-ham { display: none; }
  .v4-drawer { display: none; }
}

/* ===================================================
   SCALLOP DIVIDER
   =================================================== */
.v4-scallop { height: 26px; background-repeat: repeat-x; background-size: 36px 26px; }

/* ===================================================
   HERO - single column on mobile
   =================================================== */
.v4-hero {
  background: var(--terracotta); position: relative; overflow: hidden;
  padding: 80px 20px 48px; /* top pad = nav height + breathing room */
}
.v4-hero::before {
  content: ''; position: absolute; inset: 0;
  background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNjAiIGhlaWdodD0iMTYwIiB2aWV3Qm94PSIwIDAgMTYwIDE2MCI+CiAgPHBhdGggZD0iTTE0IDE1MCBWNjQgYTMzIDMzIDAgMCAxIDY2IDAgVjE1MCBaIiBmaWxsPSIjRkRGMEREIiBmaWxsLW9wYWNpdHk9IjAuMTYiPjwvcGF0aD4KICA8cGF0aCBkPSJNOTQgMTAgVjk2IGEzMyAzMyAwIDAgMCA2NiAwIFYxMCBaIiBmaWxsPSIjRkRGMEREIiBmaWxsLW9wYWNpdHk9IjAuMTYiPjwvcGF0aD4KPC9zdmc+'); background-size: 130px;
  opacity: .32; pointer-events: none;
}
.v4-hero-inner { position: relative; max-width: 1180px; margin: 0 auto; }
.v4-hello { font-family: var(--font-display); font-size: 18px; letter-spacing: .04em; color: var(--cream); margin: 0 0 8px; display: inline-block; }
.v4-hero h1 {
  font-family: var(--font-display); font-weight: 700; text-transform: lowercase;
  font-size: clamp(44px, 11vw, 78px); line-height: 1.04; letter-spacing: .01em;
  color: var(--cream); margin: 0 0 16px;
}
.v4-hero h1 .scr { font-family: var(--font-script); color: var(--cream-50); font-size: 1.02em; }
.v4-hero-sub {
  font-family: var(--font-display); font-size: 17px;
  color: color-mix(in oklch, #fff 88%, transparent);
  line-height: 1.6; margin: 0 0 24px; max-width: 430px;
}
.v4-hero-sub .nb { white-space: nowrap; }

/* mobile arch row - visible only on mobile, replaces the desktop collage */
.v4-arch-row {
  display: flex; gap: 12px; justify-content: center; margin: 28px 0 0; overflow: hidden;
}
.v4-arch-row-item {
  flex: none; border-radius: 999px 999px 0 0; position: relative;
  border: 5px solid var(--cream); box-shadow: var(--shadow-md);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.v4-arch-row-item img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
.v4-arch-row-item::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(38,32,26,.45), rgba(38,32,26,0) 60%); }
.v4-arch-row-item span { position: relative; z-index: 1; font-family: var(--font-script); color: var(--cream); font-size: 18px; text-shadow: 0 1px 6px rgba(0,0,0,.5); }

/* desktop collage */
.v4-collage {
  display: none; position: relative; height: clamp(380px, 38vw, 470px);
}
.v4-arch-window {
  position: absolute; left: 8%; top: 0; width: 58%; height: 100%;
  border-radius: 999px 999px 0 0; overflow: hidden;
  border: 6px solid var(--cream); box-shadow: var(--shadow-lg);
  background: var(--olive-green);
}
.v4-arch-window img { width: 100%; height: 100%; object-fit: cover; display: block; }
.v4-polaroid {
  position: absolute; background: var(--cream-50); padding: 10px 10px 30px;
  box-shadow: var(--shadow-md); border-radius: 6px;
}
.v4-polaroid img.ph { width: 100%; height: calc(100% - 12px); object-fit: cover; display: block; }
.v4-polaroid .cap { font-family: var(--font-script); font-size: 16px; color: var(--ink-700); position: absolute; bottom: 4px; left: 0; right: 0; text-align: center; }
.v4-tape { position: absolute; top: -10px; left: 50%; transform: translateX(-50%) rotate(-5deg); width: 70px; height: 20px; background: color-mix(in oklch, var(--warm-beige) 80%, transparent); border-radius: 2px; }
.v4-sun-spin { position: absolute; animation: v4spin 16s linear infinite; }

@media (min-width: 700px) {
  .v4-hero { padding: 110px clamp(16px,4vw,56px) 70px; }
  .v4-hero-inner { display: grid; grid-template-columns: 1.05fr .95fr; gap: clamp(24px,4vw,56px); align-items: center; }
  .v4-arch-row { display: none; }
  .v4-collage { display: block; }
  .v4-hello { font-size: clamp(22px,2.4vw,32px); }
}

@media (max-width: 699px) {
  .v4-hero { text-align: center; padding-top: 112px; padding-bottom: 60px; }
  .v4-hero h1 { font-size: clamp(50px, 12.6vw, 88px); }
  .v4-hero-sub { margin-left: auto; margin-right: auto; font-size: 16px; }
  .v4-hero-sub .nb { white-space: nowrap; }
  .v4-hero-sub + div { display: none !important; }
  .v4-arch-row { margin-top: 48px; gap: 3.5vw; align-items: flex-end; }
  .v4-arch-row-item { height: auto !important; }
  .v4-arch-row-item:nth-child(1) { width: 30% !important; aspect-ratio: 9 / 15 !important; }
  .v4-arch-row-item:nth-child(2) { width: 36% !important; aspect-ratio: 11 / 18.4 !important; }
  .v4-arch-row-item:nth-child(3) { width: 28% !important; aspect-ratio: 7 / 11.5 !important; }
  .v4-arch-row-item span { font-size: 22px; }
}
@keyframes v4spin { to { transform: rotate(360deg); } }
@media (prefers-reduced-motion: reduce) { .v4-sun-spin, .v4-ticker-track { animation: none !important; } }

/* ===================================================
   STICKY BOOK BUTTON - mobile only, bottom of screen
   =================================================== */
.v4-sticky-book {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  padding: 12px 20px calc(12px + env(safe-area-inset-bottom));
  background: color-mix(in oklch, var(--cream) 90%, transparent);
  backdrop-filter: blur(8px);
  border-top: 1.5px solid var(--border-soft);
  display: flex; gap: 12px;
}
.v4-sticky-book button {
  flex: 1; height: 52px; border-radius: var(--radius-pill);
  font-family: var(--font-sans); font-size: 16px; font-weight: 700;
  border: none; cursor: pointer;
}
.v4-sticky-book .primary { background: var(--terracotta); color: #fff; }
.v4-sticky-book .secondary { background: transparent; color: var(--text-strong); border: 1.5px solid var(--border-strong) !important; }
@media (min-width: 700px) { .v4-sticky-book { display: none; } }

/* ===================================================
   TICKER
   =================================================== */
.v4-ticker { background: var(--dark-brown); padding: 11px 0; overflow: hidden; }
.v4-ticker-track { display: inline-flex; gap: 28px; align-items: center; white-space: nowrap; animation: v4slide 22s linear infinite; }
@keyframes v4slide { to { transform: translateX(-50%); } }
.v4-ticker-track span { font-family: var(--font-script); font-size: 19px; color: var(--cream); }
.v4-ticker-track img { width: 13px; opacity: .7; }

/* ===================================================
   SECTION SHELL
   =================================================== */
.v4-wrap { max-width: 1180px; margin: 0 auto; padding: clamp(44px,6vw,96px) 20px; }
.v4-eyebrow { font-family: var(--font-sans); font-size: 12px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--brand); margin: 0 0 8px; }
.v4-title { font-family: var(--font-display); font-weight: 300; text-transform: lowercase; font-size: clamp(32px, 8vw, 56px); line-height: 1.05; color: var(--ink-900); margin: 0; }
.v4-title .scr { font-family: var(--font-script); color: var(--rust-orange); }

@media (min-width: 700px) {
  .v4-wrap { padding: clamp(56px,7vw,96px) clamp(28px,4vw,56px); }
}

/* ===================================================
   MENU CARD
   =================================================== */
.v4-menucard {
  background: var(--cream-50); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md); padding: 24px 18px;
  position: relative; margin-top: 32px;
  border: 1.5px solid var(--border-soft);
}
.v4-menucard::before, .v4-menucard::after {
  content: ''; position: absolute; width: 80px; height: 22px;
  background: color-mix(in oklch, var(--sage-green) 55%, transparent); border-radius: 3px;
}
.v4-menucard::before { top: -10px; left: 10%; transform: rotate(-4deg); }
.v4-menucard::after { top: -10px; right: 10%; transform: rotate(3deg); }

/* single column on mobile, 2-col on desktop */
.v4-menu-grid { display: grid; grid-template-columns: 1fr; gap: 0; }
@media (min-width: 700px) {
  .v4-menucard { padding: clamp(28px,4vw,52px); }
  .v4-menu-grid { grid-template-columns: 1fr 1fr; gap: clamp(24px,4vw,56px); }
}

.v4-menu-cat { margin-bottom: 22px; padding-bottom: 22px; border-bottom: 1.5px solid var(--border-soft); }
.v4-menu-cat:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
@media (min-width: 700px) {
  .v4-menu-cat { border-bottom: none; padding-bottom: 0; }
}
.v4-menu-cat h3 { font-family: var(--font-script); font-size: 27px; color: var(--rust-orange); margin: 0 0 4px; }
.v4-menu-cat .note { font-family: var(--font-sans); font-size: 12.5px; font-style: italic; color: var(--text-muted); margin: 0 0 10px; }
.v4-mrow {

/* v4 - session calendar with reservation */
function CalendarV4({ onBook }) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const [view, setView] = React.useState(new Date(today.getFullYear(), today.getMonth(), 1));
  const [sel, setSel] = React.useState(new Date(today));

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOWS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  const year = view.getFullYear(), month = view.getMonth();
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const cells = [];
  for (let i=0; i<firstDow; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);

  const sameDay = (a,b) => a && b && a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  const prevMonth = () => setView(new Date(year, month-1, 1));
  const nextMonth = () => setView(new Date(year, month+1, 1));

  const selSessions = sel ? (window.V4_SCHEDULE[sel.getDay()] || []) : [];
  const selLabel = sel ? `${DOWS[sel.getDay()]}, ${MONTHS[sel.getMonth()].slice(0,3)} ${sel.getDate()}` : '';
  const selIsPast = sel && sel < today;

  return (
    <section id="schedule" className="v4-cal-section">
      <div className="v4-wrap">
        <p className="v4-eyebrow">sessions and reservations</p>
        <h2 className="v4-title">this month <span className="scr">at the studio</span></h2>
        <p style={{ fontFamily:'var(--font-sans)', fontSize:16, color:'var(--text-body)', maxWidth:520, margin:'12px 0 0' }}>
          Tap any day to see what's on, then reserve your spot.
        </p>

        <div className="v4-cal-card">
          {/* month grid */}
          <div className="v4-cal-left">
            <div className="v4-cal-head">
              <h3>{MONTHS[month].toLowerCase()} {year}</h3>
              <div className="v4-cal-nav">
                <button onClick={prevMonth} aria-label="Previous month">←</button>
                <button onClick={nextMonth} aria-label="Next month">→</button>
              </div>
            </div>
            <div className="v4-cal-grid">
              {DOWS.map(d => <div key={d} className="v4-dow">{d.slice(0,1)}</div>)}
              {cells.map((d, i) => {
                if (d===null) return <div key={'e'+i}></div>;
                const date = new Date(year, month, d);
                const sessions = window.V4_SCHEDULE[date.getDay()] || [];
                const isPast = date < today;
                return (
                  <button
                    key={d}
                    className={'v4-day'+(sameDay(date,sel)?' sel':'')+(sameDay(date,today)?' today':'')}
                    disabled={isPast}
                    onClick={() => setSel(date)}
                  >
                    {d}
                    <span className="dots">
                      {sessions.slice(0,3).map((s,j) => (
                        <i key={j} style={{ background: sameDay(date,sel) ? 'var(--cream)' : s.tone }}></i>
                      ))}
                    </span>
                  </button>
                );
              })}
            </div>
            <p className="v4-cal-legend">● dots = session types · tap a day to see details</p>
          </div>

          {/* day detail panel */}
          <div className="v4-cal-right">
            <h4>{selLabel}</h4>
            <p className="sub">
              {selSessions.length
                ? `${selSessions.length} session${selSessions.length>1?'s':''} available`
                : '\u00a0'}
            </p>
            {selIsPast ? (
              <p className="v4-empty">that day's gone, pick a day ahead!</p>
            ) : selSessions.length===0 ? (
              <p className="v4-empty">studio's quiet this day, book it privately?</p>
            ) : (
              selSessions.map((s) => (
                <div className="v4-sess" key={s.name}>
                  <div>
                    <p className="t">{s.name}</p>
                    <p className="d">{s.time}</p>
                  </div>
                  <button onClick={() => onBook(`${s.name} · ${selLabel} · ${s.time}`)}>Reserve</button>
                </div>
              ))
            )}
            <p style={{ fontFamily:'var(--font-script)', fontSize:19, color:'var(--cream)', margin:'auto 0 0', paddingTop:16, opacity:.88 }}>
              walk-ins welcome when seats are free
            </p>
          </div>
        </div>
      </div>
    </section>
  );
}

function BookingModalV4({ open, preset, onClose }) {
  const { Button, Input, Badge } = window.ArtizenDesignSystem_1e5f51;
  const [done, setDone] = React.useState(false);
  React.useEffect(() => { if (open) setDone(false); }, [open]);
  if (!open) return null;
  return (
    <div className="v4-modal-overlay" onClick={onClose}>
      <div className="v4-modal-sheet" onClick={e => e.stopPropagation()}>
        {/* drag handle */}
        <div style={{ display:'flex', justifyContent:'center', padding:'10px 0 0' }}>
          <div style={{ width:40, height:4, borderRadius:2, background:'var(--border-medium)' }}></div>
        </div>
        <div style={{ background:'var(--terracotta)', padding:'18px 24px 14px', color:'#fff' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
            <span style={{ fontFamily:'var(--font-sans)', fontWeight:600, letterSpacing:'.14em', textTransform:'uppercase', fontSize:11, opacity:.9 }}>Reserve a spot</span>
            <button onClick={onClose} aria-label="Close" style={{ background:'none', border:'none', color:'#fff', fontSize:22, cursor:'pointer', lineHeight:1, padding:0, width:36, height:36, display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
          </div>
          <h2 style={{ fontFamily:'var(--font-script)', fontWeight:400, fontSize:28, margin:'4px 0 0', color:'#fff' }}>
            {done ? 'you\u2019re all set!' : 'save my seat'}
          </h2>
        </div>
        {done ? (
          <div style={{ padding:'28px 24px', textAlign:'center' }}>
            <p style={{ fontFamily:'var(--font-sans)', fontSize:16, color:'var(--text-body)', marginBottom:20 }}>
              Thanks! We'll message you shortly to confirm{preset ? <>: <strong>{preset}</strong></> : null}.
            </p>
            <Button variant="olive" onClick={onClose}>Lovely, see you soon</Button>
          </div>
        ) : (
          <form onSubmit={e => { e.preventDefault(); setDone(true); }} style={{ padding:'18px 24px 32px', display:'flex', flexDirection:'column', gap:14 }}>
            {preset && <div><Badge tone="clay" style={{ maxWidth:'100%', whiteSpace:'normal' }}>{preset}</Badge></div>}
            <Input label="Your name" placeholder="e.g. Lana" required />
            <Input label="Phone / WhatsApp" type="tel" placeholder="07x xxx xxxx" required />
            <Input label="Number of guests" type="number" defaultValue={2} min={1} />
            <Input label="Anything we should know?" multiline rows={2} placeholder="A birthday, a color theme…" />
            <Button variant="primary" size="lg" type="submit" style={{ width:'100%', marginTop:4 }}>Request reservation</Button>
          </form>
        )}
      </div>
    </div>
  );
}

function AppV4() {
  const [booking, setBooking] = React.useState({ open:false, preset:null });
  const openBook = (preset=null) => setBooking({ open:true, preset:typeof preset==='string'?preset:null });
  const closeBook = () => setBooking(b => ({ ...b, open:false }));
  return (
    <>
      <NavV4 onBook={openBook} />
      <HeroV4 onBook={openBook} />
      <MenuV4 onBook={openBook} />
      <CalendarV4 onBook={openBook} />
      <OccasionsV4 onBook={openBook} />
      <AboutV4 />
      <FAQV4 />
      <FooterV4 onBook={openBook} />
      <StickyBookV4 onBook={openBook} />
      <BookingModalV4 open={booking.open} preset={booking.preset} onClose={closeBook} />
    </>
  );
}
Object.assign(window, { FooterV4, BookingModalV4 });
ReactDOM.createRoot(document.getElementById('root')).render(<AppV4 />);

</script>
